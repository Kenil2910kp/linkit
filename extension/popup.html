<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkIt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F0EDEA" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
      </div>
      <span class="brand-name">LinkIt</span>
    </div>
    <button id="logoutBtn" class="btn-logout">Logout</button>
  </div>

  <!-- Current Page Info -->
  <div class="current-page" id="currentPageInfo">
    <div class="current-page-title" id="currentPageTitle">Loading...</div>
    <div class="current-page-url" id="currentPageUrl">Loading...</div>
  </div>

  <!-- Navigation Tabs -->
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="favorites">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
      </svg>
      Favorites
    </button>
    <button class="nav-tab" data-view="collections">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
      </svg>
      Collections
    </button>
  </div>

  <!-- API Key Setup -->
  <div class="api-key-setup" id="apiKeySetup" style="display: none;">
    <div class="api-key-content">
      <div class="setup-icon">🔑</div>
      <h2>Enter API Key</h2>
      <p>Get your API key from LinkIt → Integrations</p>
      <input type="text" id="apiKeyInput" placeholder="Paste your API key…" class="text-input">
      <button id="saveApiKeyBtn" class="btn-primary">Save Key</button>
      <div class="error-message" id="apiKeyError"></div>
    </div>
  </div>

  <!-- Error State -->
  <div class="error-state" id="errorState" style="display: none;">
    <div class="error-content">
      <div class="setup-icon">⚠️</div>
      <p id="errorMessage"></p>
      <button id="retryBtn" class="btn-primary">Retry</button>
      <button id="resetApiKeyBtn" class="btn-secondary">Re-enter API Key</button>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">

    <!-- Search Bar -->
    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search favorites…" class="search-input">
    </div>

    <!-- Favorites View -->
    <div class="view-content" id="favoritesView">
      <button id="addToFavoritesBtn" class="btn-add-tab">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Current Tab to Favorites
      </button>
      <div class="links-list" id="favoritesList"></div>
    </div>

    <!-- Collections View — clicking a collection adds the current tab instantly -->
    <div class="view-content" id="collectionsView" style="display: none;">
      <div class="collections-hint">Tap a collection to instantly save the current tab to it.</div>
      <div class="collections-list" id="collectionsList"></div>
    </div>

  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
